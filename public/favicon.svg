<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Rounded Square App Icon Container -->
  <rect x="2" y="2" width="20" height="20" rx="5.5" fill="url(#logo-container-bg)" stroke="url(#logo-container-border)" stroke-width="1.2" />
  
  <!-- Monogram A -->
  <path d="M7 17L11.2 7.2C11.5 6.5 12.5 6.5 12.8 7.2L17 17" stroke="url(#logo-a-grad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M9.5 13.2C10.8 12 13.2 12 14.5 13.2" stroke="url(#logo-wave-grad)" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="12" cy="6.2" r="1.5" fill="#F59E0B" />

  <defs>
    <!-- Background: Deep cosmic dark blue/indigo -->
    <linearGradient id="logo-container-bg" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e0a1b" />
      <stop offset="1" stop-color="#05030a" />
    </linearGradient>
    
    <!-- Border: Glowing neon spectrum -->
    <linearGradient id="logo-container-border" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" />
      <stop offset="0.5" stop-color="#ec4899" />
      <stop offset="1" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Letter A legs gradient -->
    <linearGradient id="logo-a-grad" x1="7" y1="7" x2="17" y2="17" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" />
      <stop offset="1" stop-color="#e2e8f0" />
    </linearGradient>
    
    <!-- Crossbar wave gradient -->
    <linearGradient id="logo-wave-grad" x1="9.5" y1="12" x2="14.5" y2="13.2" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa" />
      <stop offset="1" stop-color="#ec4899" />
    </linearGradient>
  </defs>
</svg>